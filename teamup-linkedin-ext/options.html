<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TeamUp Lead Capture — Settings</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;padding:40px;color:#333}
    .card{max-width:520px;margin:0 auto;background:#fff;border-radius:12px;padding:32px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    h1{font-size:20px;font-weight:600;margin-bottom:6px}
    .sub{font-size:14px;color:#666;margin-bottom:24px}
    label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:6px}
    input{width:100%;padding:10px 12px;font-size:14px;border:1px solid #ddd;border-radius:8px;outline:none;font-family:monospace}
    input:focus{border-color:#0a66c2}
    .help{font-size:12px;color:#888;margin-top:6px;line-height:1.5}
    button{margin-top:20px;padding:10px 24px;font-size:14px;font-weight:600;color:#fff;background:#0a66c2;border:none;border-radius:8px;cursor:pointer}
    button:hover{background:#004182}
    #status{margin-top:12px;font-size:13px}
  </style>
</head>
<body>
  <div class="card">
    <h1>TeamUp Lead Capture</h1>
    <p class="sub">Configure your API endpoint</p>
    <label for="apiUrl">API URL (Render.com)</label>
    <input type="text" id="apiUrl" placeholder="https://your-app.onrender.com/api/lead"/>
    <p class="help">The extension will POST lead data to this URL.</p>
    <button id="saveBtn">Save settings</button>
    <p id="status"></p>
  </div>
  <script src="options.js"></script>
</body>
</html>
